<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pressespiegel</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --ink:#e8e6e1;--ink2:#a8a29e;--ink3:#78716c;
      --bg:#141210;--bg2:#1c1a17;--bg3:#292524;
      --card:#1c1a17;--card-h:#242220;
      --rule:#333029;--rule2:#44403c;
      --accent:#c2956a;--accent2:#d4a574;
      --blue:#7da2c9;--red:#c97d7d;--green:#7dc9a0;
      --r:4px;
    }
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
    ::selection{background:var(--accent);color:var(--bg)}

    /* ══ Masthead ══ */
    .masthead{text-align:center;padding:24px 20px 16px;border-bottom:3px double var(--rule2)}
    .masthead h1{font-family:'Newsreader',Georgia,serif;font-size:2.8em;font-weight:700;letter-spacing:2px;line-height:1}
    .masthead .edition{font-size:.7em;color:var(--ink3);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
    .masthead .rule{width:60px;height:1px;background:var(--accent);margin:10px auto 0}

    /* ══ Date nav ══ */
    .dbar{display:flex;justify-content:center;gap:0;border-bottom:1px solid var(--rule);background:var(--bg)}
    .dtab{padding:10px 24px;font-size:.75em;font-weight:500;color:var(--ink3);cursor:pointer;border:none;background:none;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px}
    .dtab:hover{color:var(--ink2)}.dtab.on{color:var(--accent);border-bottom-color:var(--accent)}

    /* ══ Toolbar ══ */
    .tbar{background:rgba(20,18,16,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
    .tl{font-size:.58em;color:var(--ink3);text-transform:uppercase;letter-spacing:2px;font-weight:600}
    .sep{width:1px;height:14px;background:var(--rule)}
    .chip{padding:4px 12px;border:1px solid var(--rule);border-radius:2px;font-size:.72em;cursor:pointer;color:var(--ink3);background:none;font-family:inherit;transition:all .1s;font-weight:500;letter-spacing:.3px}
    .chip:hover{border-color:var(--accent);color:var(--accent)}
    .chip.on{background:var(--accent);border-color:var(--accent);color:var(--bg)}
    .chip.arc-on{background:var(--ink3);border-color:var(--ink3);color:var(--bg)}
    .tbar-r{margin-left:auto;font-size:.68em;color:var(--ink3)}

    /* ══ Main ══ */
    .main{max-width:1300px;margin:0 auto;padding:28px 24px 80px}

    /* ══ Section ══ */
    .csec{margin-bottom:36px}
    .chead{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;border-bottom:1px solid var(--rule);padding-bottom:8px}
    .chead h2{font-family:'Newsreader',Georgia,serif;font-size:1.15em;font-weight:600;color:var(--ink)}
    .chead .ccount{font-size:.68em;color:var(--ink3)}

    /* ══ Grid – newspaper columns ══ */
    .grid{display:grid;gap:1px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));background:var(--rule)}

    /* ══ Card ══ */
    .card{background:var(--card);padding:20px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;gap:10px}
    .card:hover{background:var(--card-h)}
    .card.archived{opacity:.25;order:999}.card.archived:hover{opacity:.45}
    .card.hide{display:none}
    .card.voted-up{box-shadow:inset 3px 0 0 var(--green)}
    .card.voted-down{opacity:.25}

    .card-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--r)}
    .card-img-ph{display:none}

    .card-meta{display:flex;align-items:center;gap:8px}
    .csrc{font-size:.6em;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.2px}
    .ctime{font-size:.6em;color:var(--ink3)}

    .ctitle{font-family:'Newsreader',Georgia,serif;font-size:1.1em;line-height:1.45;font-weight:600}
    .ckurz{font-size:.82em;line-height:1.6;color:var(--ink2)}

    .cfoot{display:flex;align-items:center;gap:6px;margin-top:auto;padding-top:8px}
    .vb{background:none;border:1px solid var(--rule);border-radius:2px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.78em;cursor:pointer;transition:all .1s}
    .vb:hover{border-color:var(--accent)}.vb.up{border-color:var(--green);color:var(--green)}.vb.dn{border-color:var(--red);color:var(--red)}
    .ab{margin-left:auto;background:none;border:1px solid var(--rule);border-radius:2px;padding:3px 10px;font-size:.62em;color:var(--ink3);cursor:pointer;font-family:inherit;transition:all .1s;letter-spacing:.5px;text-transform:uppercase}
    .ab:hover{border-color:var(--accent);color:var(--accent)}
    .card.archived .ab{color:var(--green);border-color:var(--green)}

    .fb-row{width:100%;display:none;gap:6px;align-items:center}.fb-row.show{display:flex}
    .fb-input{flex:1;background:var(--bg);border:1px solid var(--rule);border-radius:var(--r);padding:5px 8px;font-size:.72em;color:var(--ink);font-family:inherit;outline:none}
    .fb-input::placeholder{color:var(--ink3)}.fb-input:focus{border-color:var(--accent)}
    .fb-send{background:var(--accent);border:none;border-radius:var(--r);padding:5px 10px;font-size:.7em;color:var(--bg);cursor:pointer;font-family:inherit;font-weight:600}

    /* ══ Toast ══ */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:var(--bg);padding:10px 24px;border-radius:var(--r);font-size:.82em;font-weight:500;z-index:999;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.4)}.toast.err{background:var(--red)}.toast.show{transform:translateX(-50%) translateY(0)}

    /* ══ Panel ══ */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}.ov.open{opacity:1;pointer-events:all}
    .pnl{position:fixed;top:0;left:50%;bottom:0;width:min(780px,100vw);background:var(--bg2);z-index:301;transform:translateX(-50%) translateY(100%);transition:transform .3s ease;display:flex;flex-direction:column;border-left:1px solid var(--rule);border-right:1px solid var(--rule);border-radius:12px 12px 0 0}.pnl.open{transform:translateX(-50%) translateY(0)}

    .pbar{padding:14px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:1px solid var(--rule)}
    .pbk{background:none;border:1px solid var(--rule);color:var(--ink2);border-radius:2px;padding:5px 14px;cursor:pointer;font-size:.78em;font-family:inherit;transition:all .1s}
    .pbk:hover{border-color:var(--accent);color:var(--accent)}
    .pcat{font-size:.62em;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-weight:600}
    .pbar-r{margin-left:auto;display:flex;align-items:center;gap:10px}
    .pbar-arc{background:none;border:1px solid var(--rule);border-radius:2px;padding:4px 12px;font-size:.68em;color:var(--ink3);cursor:pointer;font-family:inherit;transition:all .1s;letter-spacing:.5px}
    .pbar-arc:hover{border-color:var(--accent);color:var(--accent)}.pbar-arc.done{border-color:var(--green);color:var(--green)}
    .pprog{width:60px;height:2px;background:var(--rule);border-radius:1px;overflow:hidden}.pprog-fill{height:100%;background:var(--accent);width:0;transition:width .5s linear}

    .pscroll{flex:1;overflow-y:auto}
    .phero{width:100%;max-height:340px;object-fit:cover}
    .pcont{padding:32px 40px 56px;max-width:680px}

    .pt{font-family:'Newsreader',Georgia,serif;font-size:2em;line-height:1.3;margin-bottom:16px;font-weight:700}
    .psrc{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--rule)}
    .psc{font-size:.65em;font-weight:600;color:var(--accent);letter-spacing:.5px;border:1px solid rgba(194,149,106,.3);border-radius:2px;padding:3px 10px}.psc a{color:inherit;text-decoration:none}.psc a:hover{text-decoration:underline}
    .ptm{font-size:.7em;color:var(--ink3);margin-left:auto}
    .psum{background:rgba(194,149,106,.06);border-left:2px solid var(--accent);padding:16px 20px;margin-bottom:28px;font-family:'Inter',system-ui,sans-serif;font-size:.92em;line-height:1.8;color:var(--ink2);font-style:normal}
    .pgeg{background:rgba(125,162,201,.05);border-left:2px solid var(--blue);padding:14px 18px;margin:24px 0;border-radius:0 var(--r) var(--r) 0}
    .pgeg-l{font-size:.58em;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}.pgeg p{font-size:.88em;line-height:1.7;color:var(--ink3);font-style:normal}

    .pbdy{font-family:'Inter',system-ui,sans-serif;font-size:.93em;line-height:1.85;color:var(--ink2)}
    .pbdy p{margin-bottom:1.2em;text-align:justify;hyphens:auto}
    .pbdy h2{font-size:1.15em;margin:1.8em 0 .6em;font-weight:600;color:var(--ink);letter-spacing:.3px}
    .pbdy strong{color:var(--ink)}
    .pbdy blockquote{border-left:2px solid var(--accent);padding-left:16px;color:var(--ink3);margin:1.2em 0;font-style:italic}
    .pbdy ul,.pbdy ol{margin:.5em 0 1em 1.4em}.pbdy li{margin-bottom:.3em}
    .pbdy hr{border:none;border-top:1px solid var(--rule);margin:1.8em 0}

    .pftr{margin-top:32px;padding-top:20px;border-top:1px solid var(--rule)}
    .pftr-l{font-size:.58em;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}.pftr ul{list-style:none}.pftr li{font-size:.78em;color:var(--ink3);padding:3px 0}.pftr a{color:var(--accent);text-decoration:none}.pftr a:hover{text-decoration:underline}
    .pload{display:flex;align-items:center;justify-content:center;height:200px;color:var(--ink3);font-style:italic}
    #loadS{text-align:center;padding:80px 20px;color:var(--ink3);font-style:italic}

    footer{text-align:center;padding:20px;font-size:.65em;color:var(--ink3);letter-spacing:1px;border-top:3px double var(--rule2)}
    footer span{color:var(--accent)}

    @media(max-width:600px){.masthead h1{font-size:2em}.pcont{padding:20px 16px 30px}.main{padding:14px 10px 60px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="masthead">
  <h1>PRESSESPIEGEL</h1>
  <div class="edition" id="hM">Wird geladen…</div>
  <div class="rule"></div>
</div>
<div class="dbar" id="db"></div>
<div class="tbar">
  <span class="tl">Ressort</span>
  <button class="chip on" data-cat="all">Alle</button>
  <button class="chip" data-cat="regional">Bern</button>
  <button class="chip" data-cat="schweiz">Schweiz</button>
  <button class="chip" data-cat="international">Welt</button>
  <button class="chip" data-cat="politik">Politik</button>
  <button class="chip" data-cat="wirtschaft">Wirtschaft</button>
  <button class="chip" data-cat="tech">Technologie</button>
  <div class="sep"></div>
  <button class="chip" id="arcT">Archiv</button>
  <button class="chip" id="fbSync">↑ Feedback</button>
  <span class="tbar-r" id="acnt"></span>
</div>
<div class="main" id="mc"><div id="loadS">Ausgabe wird geladen…</div></div>
<footer>Zusammengestellt von <span>Data</span> · Pressespiegel für François</footer>
<div class="toast" id="toast"></div>
<div class="ov" id="ov"></div>
<div class="pnl" id="pnl">
  <div class="pbar">
    <button class="pbk" id="pbk">← Zurück</button>
    <span class="pcat" id="pcat"></span>
    <div class="pbar-r">
      <button class="pbar-arc" id="parc" onclick="pArc()">Archivieren</button>
      <div class="pprog"><div class="pprog-fill" id="pf"></div></div>
    </div>
  </div>
  <div class="pscroll" id="psc"><div class="pload">Laden…</div></div>
</div>
<script>
const REPO='bredar/pressespiegel',B='main',R=`https://raw.githubusercontent.com/${REPO}/${B}`;
const WEBHOOK='https://data.swissmentor.com/v1/chat/completions';
const TOKEN=new URLSearchParams(location.search).get('token')||'';
let M=null,cDay=null,cCat='all',shArc=false,Ca={},aT=null,curId=null;
const AK='ps-arc',VK='ps-votes',FK='ps-feedback';
const gS=k=>{try{return JSON.parse(localStorage.getItem(k)||'{}')}catch{return{}}};
const sS=(k,d)=>localStorage.setItem(k,JSON.stringify(d));
const cb=()=>`?t=${Math.floor(Date.now()/60000)}`;
function pFM(t){const m={},r=t.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);if(!r)return{meta:m,body:t};r[1].split('\n').forEach(l=>{const x=l.match(/^(\w+):\s*'([\s\S]*)'$/)||l.match(/^(\w+):\s*"([\s\S]*)"$/)||l.match(/^(\w+):\s*(.+)$/);if(x)m[x[1]]=x[2]});return{meta:m,body:r[2].trim()}}
function fD(d){const ds=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'],ms=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];const dt=new Date(d+'T12:00:00Z');return`${ds[dt.getUTCDay()]}, ${dt.getUTCDate()}. ${ms[dt.getUTCMonth()]} ${dt.getUTCFullYear()}`}
function fDs(d){const ds=['So','Mo','Di','Mi','Do','Fr','Sa'];const dt=new Date(d+'T12:00:00Z');return`${ds[dt.getUTCDay()]} ${dt.getUTCDate()}.${dt.getUTCMonth()+1}.`}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.classList.toggle('err',!!err);t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function getT(id){let t='';M?.days?.forEach(d=>{Object.values(d.editions||{}).forEach(ed=>{ed?.articles?.forEach(a=>{if(a.id===id)t=a.title})})});return t}

async function init(){try{const r=await fetch(`${R}/manifest.json${cb()}`);M=await r.json();bD();rD(M.days[0].date)}catch(e){document.getElementById('loadS').innerHTML=`⚠️ ${e.message}`}}
function bD(){const b=document.getElementById('db');b.innerHTML='';M.days.forEach((d,i)=>{const t=document.createElement('button');t.className='dtab'+(i===0?' on':'');t.textContent=i===0?'Heute':fDs(d.date);t.onclick=()=>{document.querySelectorAll('.dtab').forEach(x=>x.classList.remove('on'));t.classList.add('on');rD(d.date)};b.appendChild(t)})}

function rD(date){
  cDay=date;const day=M.days.find(d=>d.date===date);if(!day)return;
  document.getElementById('hM').textContent=`${fD(date)} · Aktualisiert ${M.updated||''}`;
  const seen=new Set(),all=[];
  ['evening','midday','morning'].forEach(ek=>{const ed=day.editions?.[ek];if(!ed?.articles)return;ed.articles.forEach(a=>{if(!seen.has(a.id)){seen.add(a.id);all.push(a)}})});
  const mc=document.getElementById('mc');mc.innerHTML='';
  if(!all.length){mc.innerHTML='<div id="loadS">Keine Artikel für diesen Tag</div>';uC(0,0);return}
  const cats={},co=['international','politik','schweiz','regional','wirtschaft','tech'];
  const cm={regional:['🏘️','Bern & Region'],schweiz:['🇨🇭','Schweiz'],international:['🌍','International'],politik:['🏛️','Politik'],wirtschaft:['💼','Wirtschaft'],tech:['⚡','Technologie']};
  all.forEach(a=>{(cats[a.category]=cats[a.category]||[]).push(a)});
  co.forEach(cat=>{if(!cats[cat]?.length)return;const[ic,lb]=cm[cat]||['•',cat];const n=cats[cat].length;const s=document.createElement('div');s.className='csec';s.dataset.cat=cat;s.innerHTML=`<div class="chead"><h2>${ic} ${lb}</h2><span class="ccount">${n} Artikel</span></div><div class="grid">${cats[cat].map(a=>mC(a,date)).join('')}</div>`;mc.appendChild(s)});
  aA()
}

function mC(a,d){
  const src=Array.isArray(a.sources)?a.sources.map(s=>s.name||s).join(' · '):(a.source||'');
  const iu=a.image?(a.image.startsWith('http')?a.image:`${R}/${d}/${a.image}`):'';
  const img=iu?`<img class="card-img" src="${iu}" loading="lazy" onerror="this.style.display='none'">`:'';
  const sid=a.id.replace(/[^a-z0-9-]/gi,'_');
  return`<div class="card" data-id="${a.id}" data-cat="${a.category}" onclick="oA('${a.id}','${d}')">
    ${img}
    <div class="card-meta"><span class="csrc">${src}</span><span class="ctime">${a.time||''}</span></div>
    <div class="ctitle">${a.title}</div>
    <div class="ckurz">${a.kurz||''}</div>
    <div class="cfoot" onclick="event.stopPropagation()">
      <button class="vb v-up" onclick="vo('${a.id}','up')">▲</button>
      <button class="vb v-dn" onclick="vo('${a.id}','down')">▼</button>
      <button class="ab" onclick="tA('${a.id}')">Archiv</button>
      <div class="fb-row" id="fbr_${sid}">
        <input class="fb-input" id="fbi_${sid}" placeholder="Feedback…" onkeydown="if(event.key==='Enter')saveFb('${a.id}')">
        <button class="fb-send" onclick="saveFb('${a.id}')">↩</button>
      </div>
    </div></div>`
}

function vo(id,v){const votes=gS(VK);if(votes[id]?.vote===v)delete votes[id];else votes[id]={vote:v,ts:Date.now()};sS(VK,votes);const sid=id.replace(/[^a-z0-9-]/gi,'_'),fbr=document.getElementById('fbr_'+sid);if(fbr){if(v==='down'&&votes[id]){fbr.classList.add('show');setTimeout(()=>{const i=document.getElementById('fbi_'+sid);if(i)i.focus()},100)}else fbr.classList.remove('show')}aA()}
function saveFb(id){const sid=id.replace(/[^a-z0-9-]/gi,'_'),inp=document.getElementById('fbi_'+sid),text=inp?.value?.trim()||'';if(text){const fb=gS(FK);fb[id]={text,ts:Date.now()};sS(FK,fb);toast('Feedback gespeichert')}const fbr=document.getElementById('fbr_'+sid);if(fbr)fbr.classList.remove('show');if(inp)inp.value=''}

async function syncFeedback(){
  const votes=gS(VK),fb=gS(FK);
  if(!Object.keys(votes).length&&!Object.keys(fb).length){toast('Kein Feedback');return}
  if(!TOKEN){toast('Token fehlt (?token=…)',true);return}
  const btn=document.getElementById('fbSync');btn.textContent='⏳ Sende…';
  const ups=[],downs=[],comments=[];
  for(const[id,v]of Object.entries(votes)){const t=getT(id)||id;if(v.vote==='up')ups.push(t);if(v.vote==='down')downs.push(t)}
  for(const[id,f]of Object.entries(fb)){comments.push(`${getT(id)||id}: "${f.text}"`)}
  let msg='[PRESSESPIEGEL FEEDBACK]\n\n';
  if(ups.length)msg+=`👍 Interessant (${ups.length}):\n${ups.map(t=>'• '+t).join('\n')}\n\n`;
  if(downs.length)msg+=`👎 Weniger davon (${downs.length}):\n${downs.map(t=>'• '+t).join('\n')}\n\n`;
  if(comments.length)msg+=`💬 Kommentare:\n${comments.map(c=>'• '+c).join('\n')}\n\n`;
  msg+='Berücksichtige dieses Feedback bei der nächsten Ausgabe. Speichere es in pressespiegel/feedback.json.';
  try{
    const r=await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify({model:'anthropic/claude-sonnet-4-6',messages:[{role:'user',content:msg}],max_tokens:200})});
    if(!r.ok)throw new Error(`${r.status}`);
    toast('✅ Feedback gesendet');localStorage.removeItem(VK);localStorage.removeItem(FK);aA()
  }catch(e){toast('❌ '+e.message,true)}finally{updFb()}
}
function updFb(){const v=Object.keys(gS(VK)).length+Object.keys(gS(FK)).length;document.getElementById('fbSync').textContent=v>0?`↑ Feedback (${v})`:'↑ Feedback'}

async function oA(id,d){
  curId=id;const pnl=document.getElementById('pnl'),ov=document.getElementById('ov'),sc=document.getElementById('psc');
  pnl.classList.add('open');ov.classList.add('open');document.body.style.overflow='hidden';sc.innerHTML='<div class="pload">Laden…</div>';updPB();
  clearTimeout(aT);const fl=document.getElementById('pf');fl.style.transition='none';fl.style.width='0';
  setTimeout(()=>{fl.style.transition='width 15s linear';fl.style.width='100%'},50);
  aT=setTimeout(()=>{const ar=gS(AK);ar[id]={ts:Date.now()};sS(AK,ar);aA();updPB()},15000);
  let meta=null;M?.days?.forEach(dy=>{Object.values(dy.editions||{}).forEach(ed=>{ed?.articles?.forEach(a=>{if(a.id===id)meta=a})})});
  document.getElementById('pcat').textContent={regional:'Bern & Region',schweiz:'Schweiz',international:'International',politik:'Politik',wirtschaft:'Wirtschaft',tech:'Technologie'}[meta?.category]||'';
  const ck=id+d;let p=Ca[ck];
  if(!p){try{const slug=id.replace(/^\d{4}-\d{2}-\d{2}-/,'');const file=meta?.file||`${d}/${slug}.md`;const r=await fetch(`${R}/${file}${cb()}`);if(!r.ok)throw new Error('Nicht verfügbar');p=pFM(await r.text());Ca[ck]=p}catch(e){sc.innerHTML=`<div style="color:var(--red);padding:20px">⚠️ ${e.message}</div>`;return}}
  const fm=p.meta,sum=fm.summary||fm.mittel||meta?.kurz||'',geg=fm.gegenstimme||'';const hero=meta?.image||fm.image;
  let srcs=[];try{if(fm.sources_json)srcs=JSON.parse(fm.sources_json);else if(Array.isArray(meta?.sources))srcs=meta.sources;else if(meta?.source)srcs=[{name:meta.source,url:meta?.url||''}]}catch{srcs=[]}
  const chips=srcs.map(s=>{const n=s.name||s,u=s.url||'';return u?`<span class="psc"><a href="${u}" target="_blank">${n}</a></span>`:`<span class="psc">${n}</span>`}).join('');
  const html=marked.parse(p.body);
  const gegH=geg?`<div class="pgeg"><div class="pgeg-l">Gegenperspektive</div><p>${geg.replace(/\\n/g,'<br>')}</p></div>`:'';
  const sftr=srcs.length?`<div class="pftr"><div class="pftr-l">Quellen</div><ul>${srcs.map(s=>`<li>${s.url?`<a href="${s.url}" target="_blank">${s.name||s}</a>`:s.name||s}</li>`).join('')}</ul></div>`:'';
  const heroUrl=hero?(hero.startsWith('http')?hero:`${R}/${d}/${hero}`):'';
  sc.innerHTML=`${heroUrl?`<img class="phero" src="${heroUrl}" onerror="this.style.display='none'">`:''}
    <div class="pcont"><div class="pt">${fm.title||meta?.title||''}</div>
    <div class="psrc">${chips}<span class="ptm">${fm.date?fD(fm.date):''}${fm.time?' · '+fm.time:''}</span></div>
    ${sum?`<div class="psum">${sum.replace(/\\n/g,'<br><br>')}</div>`:''}${gegH}
    <div class="pbdy">${html}</div>${sftr}</div>`;sc.scrollTop=0
}
function clP(){clearTimeout(aT);curId=null;document.getElementById('pnl').classList.remove('open');document.getElementById('ov').classList.remove('open');document.body.style.overflow='';document.getElementById('pf').style.width='0'}
function pArc(){if(!curId)return;const ar=gS(AK);if(ar[curId])delete ar[curId];else ar[curId]={ts:Date.now()};sS(AK,ar);aA();updPB()}
function updPB(){const b=document.getElementById('parc');if(!curId){b.textContent='Archivieren';b.classList.remove('done');return}const isA=!!gS(AK)[curId];b.textContent=isA?'✓ Archiviert':'Archivieren';b.classList.toggle('done',isA)}
function tA(id){const ar=gS(AK);if(ar[id])delete ar[id];else ar[id]={ts:Date.now()};sS(AK,ar);aA()}

function aA(){
  const ar=gS(AK),vo=gS(VK);let tot=0,unr=0;
  document.querySelectorAll('.card[data-id]').forEach(c=>{
    const id=c.dataset.id,isA=!!ar[id],v=vo[id]?.vote,sid=id.replace(/[^a-z0-9-]/gi,'_');
    c.classList.toggle('archived',isA);c.classList.toggle('hide',(!shArc&&isA)||(cCat!=='all'&&c.dataset.cat!==cCat));
    c.classList.toggle('voted-up',v==='up');c.classList.toggle('voted-down',v==='down');
    c.querySelector('.v-up')?.classList.toggle('up',v==='up');c.querySelector('.v-dn')?.classList.toggle('dn',v==='down');
    const ab=c.querySelector('.ab');if(ab)ab.textContent=isA?'✓ Archiv':'Archiv';
    const fbr=document.getElementById('fbr_'+sid);if(fbr&&v==='down')fbr.classList.add('show');else if(fbr&&v!=='down')fbr.classList.remove('show');
    tot++;if(!isA)unr++
  });
  document.querySelectorAll('.csec').forEach(s=>{if(cCat!=='all'&&s.dataset.cat!==cCat){s.style.display='none';return}s.style.display=s.querySelectorAll('.card:not(.hide)').length?'':'none'});
  uC(unr,tot);updFb()
}
function uC(u,t){document.getElementById('acnt').textContent=`${u} ungelesen · ${t} gesamt`}

document.querySelectorAll('[data-cat]').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('on'));b.classList.add('on');cCat=b.dataset.cat;aA()})});
document.getElementById('arcT').addEventListener('click',function(){shArc=!shArc;this.classList.toggle('arc-on',shArc);this.textContent=shArc?'Archiv ✓':'Archiv';aA()});
