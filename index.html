<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pressespiegel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--pri:#818cf8;--pri-dim:#6366f1;--pri-bg:rgba(129,140,248,.1);--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--card:#1e293b;--card-hover:#263548;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--border:#334155;--green:#34d399;--red:#f87171;--amber:#fbbf24;--r:12px}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    ::selection{background:var(--pri-dim);color:white}
    .hdr{background:var(--bg);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border)}.hdr h1{font-family:'DM Serif Display',serif;font-size:1.5em;font-weight:400}.hdr h1 span{color:var(--pri)}.hdr-r{font-size:.7em;color:var(--text3)}
    .dbar{background:var(--bg);display:flex;overflow-x:auto;gap:2px;padding:0 16px;border-bottom:1px solid var(--border)}.dtab{padding:10px 20px;font-size:.78em;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:none;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}.dtab:hover{color:var(--text2)}.dtab.on{color:var(--pri);border-bottom-color:var(--pri)}
    .tbar{background:rgba(30,41,59,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:200}.tl{font-size:.63em;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}.sep{width:1px;height:16px;background:var(--border)}.chip{padding:5px 14px;border:1px solid var(--border);border-radius:99px;font-size:.75em;cursor:pointer;color:var(--text3);background:none;font-family:inherit;transition:all .12s;font-weight:500}.chip:hover{border-color:var(--pri);color:var(--pri)}.chip.on{background:var(--pri-dim);border-color:var(--pri-dim);color:white}.chip.arc-on{background:var(--amber);border-color:var(--amber);color:var(--bg)}.chip.syncing{background:var(--green);border-color:var(--green);color:var(--bg)}.tbar-r{margin-left:auto;font-size:.72em;color:var(--text3)}
    .main{max-width:1280px;margin:0 auto;padding:24px 20px 80px}
    .csec{margin-bottom:32px}.chead{display:flex;align-items:center;gap:8px;margin-bottom:14px}.chead h2{font-family:'DM Serif Display',serif;font-size:1.1em;font-weight:400;color:var(--text2)}.chead::after{content:'';flex:1;height:1px;background:var(--border)}
    .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
    .card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;border:1px solid var(--border)}.card:hover{background:var(--card-hover);box-shadow:0 10px 30px rgba(0,0,0,.3);border-color:var(--pri-dim)}.card.archived{opacity:.3;order:999}.card.archived:hover{opacity:.5}.card.hide{display:none}.card.voted-up{border-left:3px solid var(--green)}.card.voted-down{opacity:.4}
    .cimg{width:100%;height:180px;object-fit:cover;background:var(--bg3)}.cimg-ph{width:100%;height:100px;background:linear-gradient(135deg,var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:center;font-size:2.2em}
    .cbody{padding:14px 16px 8px;flex:1}.csrc{font-size:.65em;font-weight:600;color:var(--pri);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}.ctitle{font-family:'DM Serif Display',serif;font-size:1em;line-height:1.4;margin-bottom:8px}.ckurz{font-size:.82em;line-height:1.55;color:var(--text3)}
    .cfoot{padding:8px 16px 10px;display:flex;align-items:center;gap:6px;border-top:1px solid var(--border);flex-wrap:wrap}
    .vb{background:none;border:1.5px solid var(--border);border-radius:99px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:.82em;cursor:pointer;transition:all .12s}.vb:hover{border-color:var(--pri);background:var(--pri-bg)}.vb.up{border-color:var(--green);background:rgba(52,211,153,.12)}.vb.dn{border-color:var(--red);background:rgba(248,113,113,.08)}
    .ab{margin-left:auto;background:none;border:1.5px solid var(--border);border-radius:99px;padding:4px 12px;font-size:.68em;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .12s;font-weight:500}.ab:hover{border-color:var(--amber);color:var(--amber)}.card.archived .ab{border-color:var(--pri);color:var(--pri)}
    .fb-row{width:100%;display:none;padding:6px 0 0;gap:6px;align-items:center}.fb-row.show{display:flex}.fb-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.75em;color:var(--text);font-family:inherit;outline:none}.fb-input::placeholder{color:var(--text3)}.fb-input:focus{border-color:var(--pri)}.fb-send{background:var(--pri-dim);border:none;border-radius:8px;padding:6px 12px;font-size:.72em;color:white;cursor:pointer;font-family:inherit;font-weight:500}.fb-send:hover{background:var(--pri)}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:var(--bg);padding:12px 24px;border-radius:var(--r);font-size:.85em;font-weight:500;z-index:999;transition:transform .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.3)}.toast.err{background:var(--red);color:white}.toast.show{transform:translateX(-50%) translateY(0)}
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px)}.ov.open{opacity:1;pointer-events:all}
    .pnl{position:fixed;top:0;right:0;bottom:0;width:min(800px,100vw);background:var(--bg2);z-index:301;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}.pnl.open{transform:translateX(0)}
    .pbar{background:var(--bg);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid var(--border)}.pbk{background:rgba(255,255,255,.06);border:none;color:var(--text2);border-radius:99px;padding:6px 16px;cursor:pointer;font-size:.8em;font-family:inherit;font-weight:500;transition:all .12s}.pbk:hover{background:rgba(255,255,255,.1);color:white}.pcat{font-size:.68em;color:var(--pri);text-transform:uppercase;letter-spacing:2px;font-weight:600}
    .pbar-r{margin-left:auto;display:flex;align-items:center;gap:8px}.pbar-arc{background:none;border:1.5px solid var(--border);border-radius:99px;padding:4px 14px;font-size:.72em;color:var(--text3);cursor:pointer;font-family:inherit;font-weight:500;transition:all .12s}.pbar-arc:hover{border-color:var(--amber);color:var(--amber)}.pbar-arc.done{border-color:var(--green);color:var(--green)}.pprog{width:50px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}.pprog-fill{height:100%;background:var(--pri);width:0;transition:width .5s linear}
    .pscroll{flex:1;overflow-y:auto}.phero{width:100%;max-height:320px;object-fit:cover}.pcont{padding:28px 36px 50px}
    .pt{font-family:'DM Serif Display',serif;font-size:1.8em;line-height:1.3;margin-bottom:16px;font-weight:400}
    .psrc{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}.psc{font-size:.68em;font-weight:600;color:var(--pri);letter-spacing:.5px;border:1.5px solid rgba(129,140,248,.3);border-radius:99px;padding:3px 12px}.psc a{color:inherit;text-decoration:none}.psc a:hover{color:var(--text)}.ptm{font-size:.72em;color:var(--text3);margin-left:auto}
    .psum{background:rgba(129,140,248,.06);border-left:3px solid var(--pri);padding:16px 20px;margin-bottom:24px;font-size:.95em;line-height:1.75;color:var(--text2);border-radius:0 var(--r) var(--r) 0}
    .pgeg{background:rgba(251,191,36,.05);border-left:3px solid var(--amber);padding:14px 18px;margin:20px 0;border-radius:0 var(--r) var(--r) 0}.pgeg-l{font-size:.6em;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}.pgeg p{font-size:.88em;line-height:1.7;color:var(--text3);font-style:italic}
    .pbdy{font-size:.92em;line-height:1.85;color:var(--text2)}.pbdy p{margin-bottom:1em}.pbdy h2{font-family:'DM Serif Display',serif;font-size:1.15em;margin:1.4em 0 .5em;font-weight:400;color:var(--text)}.pbdy strong{color:var(--text)}.pbdy blockquote{border-left:3px solid var(--pri);padding-left:14px;color:var(--text3);margin:1em 0;font-style:italic}.pbdy ul,.pbdy ol{margin:.4em 0 .9em 1.3em}.pbdy li{margin-bottom:.25em}.pbdy hr{border:none;border-top:1px solid var(--border);margin:1.4em 0}
    .pftr{margin-top:28px;padding-top:18px;border-top:1px solid var(--border)}.pftr-l{font-size:.6em;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}.pftr ul{list-style:none}.pftr li{font-size:.8em;color:var(--text3);padding:2px 0}.pftr a{color:var(--pri);text-decoration:none}.pftr a:hover{text-decoration:underline}
    .pload{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3)}
    #loadS{text-align:center;padding:80px 20px;color:var(--text3)}
    footer{background:var(--bg);color:var(--text3);text-align:center;padding:16px;font-size:.68em;letter-spacing:1px;border-top:1px solid var(--border)}footer span{color:var(--pri)}
    @media(max-width:600px){.hdr h1{font-size:1.2em}.pcont{padding:18px 14px 30px}.main{padding:14px 10px 60px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="hdr"><h1>Presse<span>spiegel</span></h1><span class="hdr-r" id="hM"></span></div>
<div class="dbar" id="db"></div>
<div class="tbar">
  <span class="tl">Thema</span>
  <button class="chip on" data-cat="all">Alle</button>
  <button class="chip" data-cat="regional">🏘️ Bern</button>
  <button class="chip" data-cat="schweiz">🇨🇭 CH</button>
  <button class="chip" data-cat="international">🌍 Welt</button>
  <button class="chip" data-cat="politik">🏛️ Politik</button>
  <button class="chip" data-cat="wirtschaft">💼 Markt</button>
  <button class="chip" data-cat="tech">⚡ Tech</button>
  <div class="sep"></div>
  <button class="chip" id="arcT">📦 Archiv</button>
  <button class="chip" id="fbSync">📤 Sync</button>
  <span class="tbar-r" id="acnt"></span>
</div>
<div class="main" id="mc"><div id="loadS">Nachrichten werden geladen…</div></div>
<footer>Zusammengestellt von <span>Data</span> für François</footer>
<div class="toast" id="toast"></div>
<div class="ov" id="ov"></div>
<div class="pnl" id="pnl">
  <div class="pbar">
    <button class="pbk" id="pbk">← Zurück</button>
    <span class="pcat" id="pcat"></span>
    <div class="pbar-r">
      <button class="pbar-arc" id="parc" onclick="pArc()">📦 Archivieren</button>
      <div class="pprog"><div class="pprog-fill" id="pf"></div></div>
    </div>
  </div>
  <div class="pscroll" id="psc"><div class="pload">Laden…</div></div>
</div>
<script>
const REPO='bredar/pressespiegel',B='main',R=`https://raw.githubusercontent.com/${REPO}/${B}`;
const WEBHOOK='https://data.swissmentor.com/v1/chat/completions';
const TOKEN=new URLSearchParams(location.search).get('token')||'';
let M=null,cDay=null,cCat='all',shArc=false,Ca={},aT=null,curId=null;
const AK='ps-arc',VK='ps-votes',FK='ps-feedback';
const gS=k=>{try{return JSON.parse(localStorage.getItem(k)||'{}')}catch{return{}}};
const sS=(k,d)=>localStorage.setItem(k,JSON.stringify(d));
const cb=()=>`?t=${Math.floor(Date.now()/60000)}`;

function pFM(t){const m={},r=t.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);if(!r)return{meta:m,body:t};r[1].split('\n').forEach(l=>{const x=l.match(/^(\w+):\s*'([\s\S]*)'$/)||l.match(/^(\w+):\s*"([\s\S]*)"$/)||l.match(/^(\w+):\s*(.+)$/);if(x)m[x[1]]=x[2]});return{meta:m,body:r[2].trim()}}
function fD(d){const ds=['So','Mo','Di','Mi','Do','Fr','Sa'],ms=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];const dt=new Date(d+'T12:00:00Z');return`${ds[dt.getUTCDay()]}, ${dt.getUTCDate()}. ${ms[dt.getUTCMonth()]} ${dt.getUTCFullYear()}`}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.classList.toggle('err',!!err);t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function getTitle(id){let t='';M?.days?.forEach(d=>{Object.values(d.editions||{}).forEach(ed=>{ed?.articles?.forEach(a=>{if(a.id===id)t=a.title})})});return t}

async function init(){try{const r=await fetch(`${R}/manifest.json${cb()}`);M=await r.json();bD();rD(M.days[0].date)}catch(e){document.getElementById('loadS').innerHTML=`<div style="color:var(--red)">⚠️ ${e.message}</div>`}}

function bD(){const b=document.getElementById('db');b.innerHTML='';M.days.forEach((d,i)=>{const t=document.createElement('button');t.className='dtab'+(i===0?' on':'');t.textContent=i===0?'📅 Heute':fD(d.date);t.onclick=()=>{document.querySelectorAll('.dtab').forEach(x=>x.classList.remove('on'));t.classList.add('on');rD(d.date)};b.appendChild(t)})}

function rD(date){
  cDay=date;const day=M.days.find(d=>d.date===date);if(!day)return;
  document.getElementById('hM').textContent=`${fD(date)} · ${M.updated||''}`;
  const seen=new Set(),all=[];
  ['evening','midday','morning'].forEach(ek=>{const ed=day.editions?.[ek];if(!ed?.articles)return;ed.articles.forEach(a=>{if(!seen.has(a.id)){seen.add(a.id);all.push(a)}})});
  const mc=document.getElementById('mc');mc.innerHTML='';
  if(!all.length){mc.innerHTML='<div id="loadS">Keine Artikel</div>';uC(0,0);return}
  const cats={},co=['regional','schweiz','international','politik','wirtschaft','tech'];
  const cm={regional:['🏘️','Bern & Region'],schweiz:['🇨🇭','Schweiz'],international:['🌍','International'],politik:['🏛️','Politik'],wirtschaft:['💼','Wirtschaft'],tech:['⚡','Tech & Mobilität']};
  all.forEach(a=>{(cats[a.category]=cats[a.category]||[]).push(a)});
  co.forEach(cat=>{if(!cats[cat]?.length)return;const[ic,lb]=cm[cat]||['•',cat];const s=document.createElement('div');s.className='csec';s.dataset.cat=cat;s.innerHTML=`<div class="chead"><span>${ic}</span><h2>${lb}</h2></div><div class="grid">${cats[cat].map(a=>mC(a,date)).join('')}</div>`;mc.appendChild(s)});
  aA()
}

function mC(a,d){
  const src=Array.isArray(a.sources)?a.sources.map(s=>s.name||s).join(' · '):(a.source||'');
  const iu=a.image?`${R}/${d}/${a.image}`:'';
  const img=iu?`<img class="cimg" src="${iu}" loading="lazy" onerror="this.outerHTML='<div class=cimg-ph>${a.icon||'📰'}</div>'">`:`<div class="cimg-ph">${a.icon||'📰'}</div>`;
  const sid=a.id.replace(/[^a-z0-9-]/gi,'_');
  return`<div class="card" data-id="${a.id}" data-cat="${a.category}" onclick="oA('${a.id}','${d}')">
    ${img}<div class="cbody"><div class="csrc">${src}</div><div class="ctitle">${a.title}</div><div class="ckurz">${a.kurz||''}</div></div>
    <div class="cfoot" onclick="event.stopPropagation()">
      <button class="vb v-up" onclick="vo('${a.id}','up')">👍</button>
      <button class="vb v-dn" onclick="vo('${a.id}','down')">👎</button>
      <button class="ab" onclick="tA('${a.id}')">📦</button>
      <div class="fb-row" id="fbr_${sid}">
        <input class="fb-input" id="fbi_${sid}" placeholder="Was war schlecht?" onkeydown="if(event.key==='Enter')saveFb('${a.id}')">
        <button class="fb-send" onclick="saveFb('${a.id}')">↩</button>
      </div>
    </div></div>`
}

function vo(id,v){
  const votes=gS(VK);if(votes[id]?.vote===v)delete votes[id];else votes[id]={vote:v,ts:Date.now()};sS(VK,votes);
  const sid=id.replace(/[^a-z0-9-]/gi,'_'),fbr=document.getElementById('fbr_'+sid);
  if(fbr){if(v==='down'&&votes[id]){fbr.classList.add('show');setTimeout(()=>{const inp=document.getElementById('fbi_'+sid);if(inp)inp.focus()},100)}else fbr.classList.remove('show')}
  aA()
}

function saveFb(id){
  const sid=id.replace(/[^a-z0-9-]/gi,'_'),inp=document.getElementById('fbi_'+sid),text=inp?.value?.trim()||'';
  if(text){const fb=gS(FK);fb[id]={text,ts:Date.now()};sS(FK,fb);toast('💬 Feedback gespeichert')}
  const fbr=document.getElementById('fbr_'+sid);if(fbr)fbr.classList.remove('show');if(inp)inp.value='';
}

// ── Webhook: Send feedback to Data via OpenClaw Gateway ──
async function syncFeedback(){
  const votes=gS(VK),fb=gS(FK);
  if(!Object.keys(votes).length&&!Object.keys(fb).length){toast('Kein Feedback vorhanden');return}
  if(!TOKEN){toast('❌ Token fehlt – URL mit ?token=... öffnen',true);return}

  const btn=document.getElementById('fbSync');
  btn.classList.add('syncing');btn.textContent='⏳ Sende…';

  // Build human-readable feedback message
  const ups=[],downs=[],comments=[];
  for(const[id,v]of Object.entries(votes)){
    const t=getTitle(id)||id;
    if(v.vote==='up')ups.push(t);
    if(v.vote==='down')downs.push(t);
  }
  for(const[id,f]of Object.entries(fb)){
    comments.push(`${getTitle(id)||id}: "${f.text}"`);
  }

  let msg='[PRESSESPIEGEL FEEDBACK]\n\n';
  if(ups.length)msg+=`👍 Interessant (${ups.length}):\n${ups.map(t=>'• '+t).join('\n')}\n\n`;
  if(downs.length)msg+=`👎 Weniger davon (${downs.length}):\n${downs.map(t=>'• '+t).join('\n')}\n\n`;
  if(comments.length)msg+=`💬 Kommentare:\n${comments.map(c=>'• '+c).join('\n')}\n\n`;
  msg+='Bitte berücksichtige dieses Feedback bei der nächsten Pressespiegel-Ausgabe.';

  try{
    const r=await fetch(WEBHOOK,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+TOKEN
      },
      body:JSON.stringify({
        model:'anthropic/claude-sonnet-4-6',
        messages:[{role:'user',content:msg}],
        max_tokens:100
      })
    });

    if(!r.ok){const e=await r.text();throw new Error(`${r.status}: ${e.slice(0,100)}`)}

    toast('✅ Feedback an Data gesendet!');
    localStorage.removeItem(VK);localStorage.removeItem(FK);
    aA();
  }catch(e){
    toast('❌ '+e.message,true);
  }finally{
    btn.classList.remove('syncing');updFbBtn();
  }
}

function updFbBtn(){
  const v=Object.keys(gS(VK)).length+Object.keys(gS(FK)).length;
  document.getElementById('fbSync').textContent=v>0?`📤 Sync (${v})`:'📤 Sync';
}

// ── Panel ──
async function oA(id,d){
  curId=id;const pnl=document.getElementById('pnl'),ov=document.getElementById('ov'),sc=document.getElementById('psc');
  pnl.classList.add('open');ov.classList.add('open');document.body.style.overflow='hidden';sc.innerHTML='<div class="pload">Laden…</div>';updPB();
  clearTimeout(aT);const fl=document.getElementById('pf');fl.style.transition='none';fl.style.width='0';
  setTimeout(()=>{fl.style.transition='width 15s linear';fl.style.width='100%'},50);
  aT=setTimeout(()=>{const ar=gS(AK);ar[id]={ts:Date.now()};sS(AK,ar);aA();updPB()},15000);

  let meta=null;M?.days?.forEach(dy=>{Object.values(dy.editions||{}).forEach(ed=>{ed?.articles?.forEach(a=>{if(a.id===id)meta=a})})});
  document.getElementById('pcat').textContent={regional:'🏘️ Bern',schweiz:'🇨🇭 Schweiz',international:'🌍 International',politik:'🏛️ Politik',wirtschaft:'💼 Wirtschaft',tech:'⚡ Tech'}[meta?.category]||'';

  const ck=id+d;let p=Ca[ck];
  if(!p){try{const slug=id.replace(/^\d{4}-\d{2}-\d{2}-/,'');const file=meta?.file||`${d}/${slug}.md`;const r=await fetch(`${R}/${file}${cb()}`);if(!r.ok)throw new Error('Nicht verfügbar');p=pFM(await r.text());Ca[ck]=p}catch(e){sc.innerHTML=`<div style="color:var(--red);padding:20px">⚠️ ${e.message}</div>`;return}}

  const fm=p.meta,sum=fm.summary||fm.mittel||meta?.kurz||'',geg=fm.gegenstimme||'';const hero=meta?.image||fm.image;
  let srcs=[];try{if(fm.sources_json)srcs=JSON.parse(fm.sources_json);else if(Array.isArray(meta?.sources))srcs=meta.sources;else if(meta?.source)srcs=[{name:meta.source,url:meta?.url||''}]}catch{srcs=[]}
  const chips=srcs.map(s=>{const n=s.name||s,u=s.url||'';return u?`<span class="psc"><a href="${u}" target="_blank">${n}</a></span>`:`<span class="psc">${n}</span>`}).join('');
  const html=marked.parse(p.body);
  const gegH=geg?`<div class="pgeg"><div class="pgeg-l">🔄 Gegenperspektive</div><p>${geg.replace(/\\n/g,'<br>')}</p></div>`:'';
  const sftr=srcs.length?`<div class="pftr"><div class="pftr-l">Quellen</div><ul>${srcs.map(s=>`<li>${s.url?`<a href="${s.url}" target="_blank">${s.name||s}</a>`:s.name||s}</li>`).join('')}</ul></div>`:'';
  sc.innerHTML=`${hero?`<img class="phero" src="${R}/${d}/${hero}" onerror="this.style.display='none'">`:''}
    <div class="pcont"><div class="pt">${fm.title||meta?.title||''}</div>
    <div class="psrc">${chips}<span class="ptm">${fm.date?fD(fm.date):''}${fm.time?' · '+fm.time:''}</span></div>
    ${sum?`<div class="psum">${sum.replace(/\\n/g,'<br><br>')}</div>`:''}${gegH}
    <div class="pbdy">${html}</div>${sftr}</div>`;sc.scrollTop=0
}
function clP(){clearTimeout(aT);curId=null;document.getElementById('pnl').classList.remove('open');document.getElementById('ov').classList.remove('open');document.body.style.overflow='';document.getElementById('pf').style.width='0'}
function pArc(){if(!curId)return;const ar=gS(AK);if(ar[curId])delete ar[curId];else ar[curId]={ts:Date.now()};sS(AK,ar);aA();updPB()}
function updPB(){const b=document.getElementById('parc');if(!curId){b.textContent='📦';b.classList.remove('done');return}const isA=!!gS(AK)[curId];b.textContent=isA?'✅ Archiviert':'📦 Archivieren';b.classList.toggle('done',isA)}
function tA(id){const ar=gS(AK);if(ar[id])delete ar[id];else ar[id]={ts:Date.now()};sS(AK,ar);aA()}

function aA(){
  const ar=gS(AK),vo=gS(VK);let tot=0,unr=0;
  document.querySelectorAll('.card[data-id]').forEach(c=>{
    const id=c.dataset.id,isA=!!ar[id],v=vo[id]?.vote,sid=id.replace(/[^a-z0-9-]/gi,'_');
    c.classList.toggle('archived',isA);c.classList.toggle('hide',(!shArc&&isA)||(cCat!=='all'&&c.dataset.cat!==cCat));
    c.classList.toggle('voted-up',v==='up');c.classList.toggle('voted-down',v==='down');
    c.querySelector('.v-up')?.classList.toggle('up',v==='up');c.querySelector('.v-dn')?.classList.toggle('dn',v==='down');
    const ab=c.querySelector('.ab');if(ab)ab.textContent=isA?'✅':'📦';
    const fbr=document.getElementById('fbr_'+sid);if(fbr&&v==='down')fbr.classList.add('show');else if(fbr&&v!=='down')fbr.classList.remove('show');
    tot++;if(!isA)unr++
  });
  document.querySelectorAll('.csec').forEach(s=>{if(cCat!=='all'&&s.dataset.cat!==cCat){s.style.display='none';return}s.style.display=s.querySelectorAll('.card:not(.hide)').length?'':'none'});
  uC(unr,tot);updFbBtn()
}
function uC(u,t){document.getElementById('acnt').textContent=`${u} neu · ${t} total`}

document.querySelectorAll('[data-cat]').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('on'));b.classList.add('on');cCat=b.dataset.cat;aA()})});
document.getElementById('arcT').addEventListener('click',function(){shArc=!shArc;this.classList.toggle('arc-on',shArc);this.textContent=shArc?'📦 Archiv ✓':'📦 Archiv';aA()});
document.getElementById('fbSync').addEventListener('click',syncFeedback);
document.getElementById('pbk').addEventListener('click',clP);document.getElementById('ov').addEventListener('click',clP);
document.addEventListener('keydown',e=>{if(e.key==='Escape')clP()});
init()
</script>
