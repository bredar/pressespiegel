<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pressespiegel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #d4a843;
      --dark: #111;
      --bg: #faf8f5;
      --card: #fff;
      --muted: #999;
      --border: #eae6df;
      --green: #2d8a4e;
      --red: #c0392b;
      --panel-w: min(780px, 100vw);
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--dark); }

    /* ── Header ── */
    .site-header {
      background: var(--dark);
      color: white;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .site-header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.6em;
      font-weight: 400;
      letter-spacing: 1px;
    }
    .site-header h1 span { color: var(--accent); }
    .header-meta { font-size: 0.72em; color: #888; }

    /* ── Date tabs ── */
    .date-bar {
      background: #1a1a1a;
      display: flex;
      overflow-x: auto;
      border-bottom: 2px solid var(--accent);
    }
    .date-tab {
      padding: 10px 22px;
      font-size: 0.78em;
      font-weight: 500;
      color: #777;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .date-tab:hover { color: #ccc; }
    .date-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .tb-label { font-size: 0.68em; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
    .tb-sep { width: 1px; height: 18px; background: var(--border); }
    .chip {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.75em;
      cursor: pointer;
      color: #666;
      background: none;
      font-family: inherit;
      transition: all 0.12s;
    }
    .chip:hover { border-color: var(--accent); color: var(--dark); }
    .chip.on { background: var(--dark); border-color: var(--dark); color: white; }
    .chip.archive-on { background: var(--accent); border-color: var(--accent); color: white; }
    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .article-count { font-size: 0.72em; color: var(--muted); }

    /* ── Main ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 28px 20px 80px; }

    /* ── Category ── */
    .cat-sec { margin-bottom: 36px; }
    .cat-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .cat-head h2 { font-family: 'Instrument Serif', serif; font-size: 1.15em; font-weight: 400; }

    /* ── Grid ── */
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .card.archived { opacity: 0.4; order: 999; }
    .card.archived:hover { opacity: 0.7; }
    .card.hide { display: none; }
    .card.voted-up { box-shadow: inset 3px 0 0 var(--green); }
    .card.voted-down { opacity: 0.35; }

    .card-img { width: 100%; height: 170px; object-fit: cover; background: #eee; display: block; }
    .card-img-ph { width: 100%; height: 80px; background: linear-gradient(135deg, #f0ebe3 0%, #e8e0d0 100%); display: flex; align-items: center; justify-content: center; font-size: 2em; }

    .card-body { padding: 14px 16px 10px; flex: 1; }
    .card-src { font-size: 0.65em; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px; }
    .card-title { font-family: 'Instrument Serif', serif; font-size: 1.05em; line-height: 1.4; margin-bottom: 7px; }
    .card-kurz { font-size: 0.82em; line-height: 1.55; color: #666; }
    .card-bottom { padding: 8px 16px 10px; display: flex; align-items: center; gap: 6px; border-top: 1px solid var(--border); }
    .card-hint { font-size: 0.68em; color: var(--accent); margin-left: auto; }
    .vbtn { background: none; border: 1px solid var(--border); border-radius: 99px; padding: 2px 10px; font-size: 0.72em; cursor: pointer; color: #bbb; font-family: inherit; }
    .vbtn:hover { border-color: var(--accent); color: #666; }
    .vbtn.up { background: #eef8f0; border-color: var(--green); color: var(--green); }
    .vbtn.dn { background: #f8f0f0; border-color: #daa; color: #c88; }

    /* ── Archive badge on card ── */
    .card .archive-badge {
      font-size: 0.6em;
      color: var(--muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 8px;
      display: none;
    }
    .card.archived .archive-badge { display: inline-block; }

    /* ── Panel ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .panel { position: fixed; top: 0; right: 0; bottom: 0; width: var(--panel-w); background: var(--card); z-index: 301; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; }
    .panel.open { transform: translateX(0); }

    .panel-bar { background: var(--dark); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .panel-back { background: none; border: 1px solid rgba(255,255,255,0.25); color: white; border-radius: 99px; padding: 5px 16px; cursor: pointer; font-size: 0.8em; font-family: inherit; }
    .panel-back:hover { background: rgba(255,255,255,0.08); }
    .panel-cat { font-size: 0.68em; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
    .panel-progress { margin-left: auto; width: 40px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
    .panel-progress-fill { height: 100%; background: var(--accent); width: 0; transition: width 0.5s linear; }

    .panel-scroll { flex: 1; overflow-y: auto; }

    .panel-hero { width: 100%; max-height: 300px; object-fit: cover; display: block; }

    .panel-content { padding: 28px 36px 50px; }
    .p-title { font-family: 'Instrument Serif', serif; font-size: 1.8em; line-height: 1.3; margin-bottom: 14px; font-weight: 400; }

    .p-sources { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .p-src-chip { font-size: 0.68em; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--accent); border-radius: 99px; padding: 2px 10px; }
    .p-src-chip a { color: inherit; text-decoration: none; }
    .p-src-chip a:hover { color: var(--red); }
    .p-time { font-size: 0.72em; color: var(--muted); margin-left: auto; font-style: italic; }

    .p-summary { background: #faf7f0; border-left: 3px solid var(--accent); padding: 14px 18px; margin-bottom: 22px; font-size: 0.95em; line-height: 1.75; color: #555; border-radius: 0 6px 6px 0; }

    .p-gegen { background: #f6f2ee; border-left: 3px solid #8b6914; padding: 12px 16px; margin: 18px 0; border-radius: 0 6px 6px 0; }
    .p-gegen-label { font-size: 0.62em; font-weight: 700; color: #8b6914; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
    .p-gegen p { font-size: 0.88em; line-height: 1.7; color: #666; font-style: italic; }

    .p-body { font-size: 0.92em; line-height: 1.85; color: #333; }
    .p-body p { margin-bottom: 1em; }
    .p-body h2 { font-family: 'Instrument Serif', serif; font-size: 1.2em; margin: 1.4em 0 0.5em; font-weight: 400; }
    .p-body strong { color: var(--dark); }
    .p-body blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: #666; margin: 1em 0; font-style: italic; }
    .p-body ul, .p-body ol { margin: 0.4em 0 0.9em 1.3em; }
    .p-body hr { border: none; border-top: 1px solid var(--border); margin: 1.4em 0; }

    .p-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
    .p-footer-label { font-size: 0.62em; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .p-footer ul { list-style: none; }
    .p-footer li { font-size: 0.8em; color: var(--muted); padding: 2px 0; }
    .p-footer a { color: var(--accent); text-decoration: none; }
    .p-footer a:hover { text-decoration: underline; }

    .p-loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); }

    #loadState { text-align: center; padding: 80px 20px; color: var(--muted); }

    footer { background: var(--dark); color: #555; text-align: center; padding: 16px; font-size: 0.7em; letter-spacing: 1px; }
    footer span { color: var(--accent); }

    @media (max-width: 600px) {
      .site-header h1 { font-size: 1.3em; }
      .panel-content { padding: 20px 16px 30px; }
      .main { padding: 16px 12px 60px; }
    }
  </style>
</head>
<body>

<div class="site-header">
  <h1>Presse<span>spiegel</span></h1>
  <span class="header-meta" id="hMeta">Wird geladen…</span>
</div>

<div class="date-bar" id="dateBar"></div>

<div class="toolbar">
  <span class="tb-label">Thema</span>
  <button class="chip on" data-cat="all">Alle</button>
  <button class="chip" data-cat="regional">🏘️</button>
  <button class="chip" data-cat="schweiz">🇨🇭</button>
  <button class="chip" data-cat="international">🌍</button>
  <button class="chip" data-cat="politik">🏛️</button>
  <button class="chip" data-cat="wirtschaft">💼</button>
  <button class="chip" data-cat="tech">⚡</button>
  <div class="tb-sep"></div>
  <button class="chip" id="archiveToggle">📦 Archiv</button>
  <div class="tb-right">
    <span class="article-count" id="articleCount"></span>
  </div>
</div>

<div class="main" id="mainContent">
  <div id="loadState">Nachrichten werden geladen…</div>
</div>

<footer><span>Data</span> für François</footer>

<div class="overlay" id="overlay"></div>
<div class="panel" id="panel">
  <div class="panel-bar">
    <button class="panel-back" id="panelBack">← Zurück</button>
    <span class="panel-cat" id="panelCat"></span>
    <div class="panel-progress"><div class="panel-progress-fill" id="progressFill"></div></div>
  </div>
  <div class="panel-scroll" id="panelScroll">
    <div class="p-loading">Artikel wird geladen…</div>
  </div>
</div>

<script>
const REPO='bredar/pressespiegel', BRANCH='main';
const RAW=`https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
let manifest=null, curDay=null, curCat='all', showArchive=false, cache={}, archiveTimer=null;

const ARC_KEY='ps-archive', VOTE_KEY='ps-votes';
const loadArc=()=>{try{return JSON.parse(localStorage.getItem(ARC_KEY)||'{}');}catch{return{};}};
const saveArc=(d)=>localStorage.setItem(ARC_KEY,JSON.stringify(d));
const loadVotes=()=>{try{return JSON.parse(localStorage.getItem(VOTE_KEY)||'{}');}catch{return{};}};
const saveVotes=(d)=>localStorage.setItem(VOTE_KEY,JSON.stringify(d));

function cb(){return`?t=${Math.floor(Date.now()/60000)}`;}
function parseFM(t){const m={},r=t.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);if(!r)return{meta:m,body:t};r[1].split('\n').forEach(l=>{const x=l.match(/^(\w+):\s*'([\s\S]*)'$/)||l.match(/^(\w+):\s*"([\s\S]*)"$/)||l.match(/^(\w+):\s*(.+)$/);if(x)m[x[1]]=x[2];});return{meta:m,body:r[2].trim()};}
function fmtD(d){const ds=['So','Mo','Di','Mi','Do','Fr','Sa'],ms=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];const dt=new Date(d+'T12:00:00Z');return`${ds[dt.getUTCDay()]}, ${dt.getUTCDate()}. ${ms[dt.getUTCMonth()]} ${dt.getUTCFullYear()}`;}

async function init(){
  try{const r=await fetch(`${RAW}/manifest.json${cb()}`);manifest=await r.json();buildDates();renderDay(manifest.days[0].date);}
  catch(e){document.getElementById('loadState').innerHTML=`<div style="color:var(--red)">⚠️ ${e.message}</div>`;}
}

function buildDates(){
  const bar=document.getElementById('dateBar');bar.innerHTML='';
  manifest.days.forEach((d,i)=>{
    const b=document.createElement('button');b.className='date-tab'+(i===0?' active':'');b.dataset.date=d.date;
    b.textContent=i===0?'Heute':fmtD(d.date);
    b.onclick=()=>{document.querySelectorAll('.date-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderDay(d.date);};
    bar.appendChild(b);
  });
}

function renderDay(date){
  curDay=date;
  const day=manifest.days.find(d=>d.date===date);if(!day)return;
  document.getElementById('hMeta').textContent=`${fmtD(date)} · ${manifest.updated||''}`;

  // Collect all articles, newest edition first
  const seen=new Set(), all=[];
  ['evening','midday','morning'].forEach(ek=>{
    const ed=day.editions?.[ek];if(!ed?.articles)return;
    ed.articles.forEach(a=>{if(!seen.has(a.id)){seen.add(a.id);all.push(a);}});
  });

  const main=document.getElementById('mainContent');main.innerHTML='';
  if(!all.length){main.innerHTML='<div id="loadState">Keine Artikel für diesen Tag</div>';updateCount(0,0);return;}

  const cats={},co=['regional','schweiz','international','politik','wirtschaft','tech'];
  const cm={regional:['🏘️','Bern & Region'],schweiz:['🇨🇭','Schweiz'],international:['🌍','International'],politik:['🏛️','Politik'],wirtschaft:['💼','Wirtschaft'],tech:['⚡','Tech & Mobilität']};
  all.forEach(a=>{(cats[a.category]=cats[a.category]||[]).push(a);});

  co.forEach(cat=>{
    if(!cats[cat]?.length)return;
    const[icon,label]=cm[cat]||['•',cat];
    const sec=document.createElement('div');sec.className='cat-sec';sec.dataset.cat=cat;
    sec.innerHTML=`<div class="cat-head"><span>${icon}</span><h2>${label}</h2></div><div class="grid">${cats[cat].map(a=>mkCard(a,date)).join('')}</div>`;
    main.appendChild(sec);
  });

  applyAll();
}

function mkCard(a,date){
  const src=Array.isArray(a.sources)?a.sources.map(s=>s.name||s).join(' · '):(a.source||'');
  const imgUrl=a.image?`${RAW}/${date}/${a.image}`:'';
  const img=imgUrl?`<img class="card-img" src="${imgUrl}" loading="lazy" onerror="this.outerHTML='<div class=card-img-ph>${a.icon||'📰'}</div>'">`:`<div class="card-img-ph">${a.icon||'📰'}</div>`;
  return`<div class="card" data-id="${a.id}" data-cat="${a.category}" onclick="openA('${a.id}','${date}')">
    ${img}
    <div class="card-body">
      <div class="card-src">${src}</div>
      <div class="card-title">${a.title}</div>
      <div class="card-kurz">${a.kurz||''}</div>
    </div>
    <div class="card-bottom" onclick="event.stopPropagation()">
      <button class="vbtn v-up" onclick="vote('${a.id}','up')">👍</button>
      <button class="vbtn v-dn" onclick="vote('${a.id}','down')">👎</button>
      <span class="archive-badge">archiviert</span>
      <span class="card-hint">Lesen →</span>
    </div>
  </div>`;
}

// ── Panel ──
async function openA(id,date){
  const panel=document.getElementById('panel'),ov=document.getElementById('overlay'),scroll=document.getElementById('panelScroll');
  panel.classList.add('open');ov.classList.add('open');document.body.style.overflow='hidden';
  scroll.innerHTML='<div class="p-loading">Artikel wird geladen…</div>';

  // Start archive timer (15s)
  clearTimeout(archiveTimer);
  const fill=document.getElementById('progressFill');fill.style.transition='none';fill.style.width='0';
  setTimeout(()=>{fill.style.transition='width 15s linear';fill.style.width='100%';},50);
  archiveTimer=setTimeout(()=>archiveArticle(id),15000);

  let meta=null;
  manifest?.days?.forEach(d=>{Object.values(d.editions||{}).forEach(ed=>{ed?.articles?.forEach(a=>{if(a.id===id)meta=a;});});});

  const catL={regional:'🏘️ Bern & Region',schweiz:'🇨🇭 Schweiz',international:'🌍 International',politik:'🏛️ Politik',wirtschaft:'💼 Wirtschaft',tech:'⚡ Tech & Mobilität'};
  document.getElementById('panelCat').textContent=catL[meta?.category]||'';

  const ck=id+date;let parsed=cache[ck];
  if(!parsed){try{
    const slug=id.replace(/^\d{4}-\d{2}-\d{2}-/,'');
    const file=meta?.file||`${date}/${slug}.md`;
    const r=await fetch(`${RAW}/${file}${cb()}`);if(!r.ok)throw new Error('Nicht verfügbar');
    parsed=parseFM(await r.text());cache[ck]=parsed;
  }catch(e){scroll.innerHTML=`<div style="color:var(--red);padding:20px">⚠️ ${e.message}</div>`;return;}}

  const fm=parsed.meta,summary=fm.summary||fm.mittel||meta?.kurz||'',gegen=fm.gegenstimme||'';
  const heroImg=meta?.image||fm.image;
  let sources=[];
  try{if(fm.sources_json)sources=JSON.parse(fm.sources_json);else if(Array.isArray(meta?.sources))sources=meta.sources;else if(meta?.source)sources=[{name:meta.source,url:meta?.url||''}];}catch{sources=[];}

  const chips=sources.map(s=>{const n=s.name||s,u=s.url||'';return u?`<span class="p-src-chip"><a href="${u}" target="_blank">${n}</a></span>`:`<span class="p-src-chip">${n}</span>`;}).join('');
  const rendered=marked.parse(parsed.body);
  const gegenH=gegen?`<div class="p-gegen"><div class="p-gegen-label">🔄 Gegenperspektive</div><p>${gegen.replace(/\\n/g,'<br>')}</p></div>`:'';
  const srcF=sources.length?`<div class="p-footer"><div class="p-footer-label">Quellen</div><ul>${sources.map(s=>{const n=s.name||s,u=s.url||'';return`<li>${u?`<a href="${u}" target="_blank">${n}</a>`:n}</li>`;}).join('')}</ul></div>`:'';

  scroll.innerHTML=`
    ${heroImg?`<img class="panel-hero" src="${RAW}/${date}/${heroImg}" onerror="this.style.display='none'">`:''}
    <div class="panel-content">
      <div class="p-title">${fm.title||meta?.title||''}</div>
      <div class="p-sources">${chips}<span class="p-time">${fm.date?fmtD(fm.date):''}${fm.time?' · '+fm.time:''}</span></div>
      ${summary?`<div class="p-summary">${summary.replace(/\\n/g,'<br><br>')}</div>`:''}
      ${gegenH}
      <div class="p-body">${rendered}</div>
      ${srcF}
    </div>`;
  scroll.scrollTop=0;
}

function closeP(){
  clearTimeout(archiveTimer);
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('progressFill').style.width='0';
}

function archiveArticle(id){
  const arc=loadArc();arc[id]={ts:Date.now()};saveArc(arc);
  applyAll();
}

// ── Votes ──
function vote(id,v){
  const votes=loadVotes();
  if(votes[id]?.vote===v)delete votes[id];else votes[id]={vote:v,ts:Date.now()};
  saveVotes(votes);applyAll();
}

// ── Apply all states ──
function applyAll(){
  const arc=loadArc(),votes=loadVotes();
  let total=0,unread=0;
  document.querySelectorAll('.card[data-id]').forEach(c=>{
    const id=c.dataset.id,isArc=!!arc[id],v=votes[id]?.vote;
    c.classList.toggle('archived',isArc);
    c.classList.toggle('hide',isArc&&!showArchive||(curCat!=='all'&&c.dataset.cat!==curCat));
    c.classList.toggle('voted-up',v==='up');
    c.classList.toggle('voted-down',v==='down');
    c.querySelector('.v-up')?.classList.toggle('up',v==='up');
    c.querySelector('.v-dn')?.classList.toggle('dn',v==='down');
    total++;if(!isArc)unread++;
  });
  document.querySelectorAll('.cat-sec').forEach(s=>{
    if(curCat!=='all'&&s.dataset.cat!==curCat){s.style.display='none';return;}
    const visible=s.querySelectorAll('.card:not(.hide)');
    s.style.display=visible.length?'':'none';
  });
  updateCount(unread,total);
}

function updateCount(unread,total){
  document.getElementById('articleCount').textContent=`${unread} neu · ${total} total`;
}

// ── Events ──
document.querySelectorAll('[data-cat]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');curCat=b.dataset.cat;applyAll();
  });
});

document.getElementById('archiveToggle').addEventListener('click',function(){
  showArchive=!showArchive;
  this.classList.toggle('archive-on',showArchive);
  this.textContent=showArchive?'📦 Archiv ✓':'📦 Archiv';
  applyAll();
});

document.getElementById('panelBack').addEventListener('click',closeP);
document.getElementById('overlay').addEventListener('click',closeP);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeP();});

init();
</script>
</body>
</html>
