<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pressespiegel – François</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold:   #c9a84c;
      --dark:   #1a1a1a;
      --red:    #8b1a1a;
      --bg:     #f5f0e8;
      --white:  #ffffff;
      --muted:  #888;
      --border: #e0d9ce;
      --green:  #2d7d46;
    }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; overflow-x: hidden; }

    /* Topbar */
    .topbar { background: var(--red); color: #f5f0e8; padding: 6px 24px; display: flex; justify-content: space-between; align-items: center; font-size: 0.72em; letter-spacing: 2px; text-transform: uppercase; flex-wrap: wrap; gap: 6px; }
    .topbar-editions { display: flex; gap: 8px; flex-wrap: wrap; }
    .ed-jump { padding: 2px 10px; border-radius: 10px; background: rgba(255,255,255,0.15); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .ed-jump:hover { background: rgba(255,255,255,0.3); }

    /* Header */
    header { background: var(--dark); color: white; padding: 22px 40px 18px; text-align: center; border-bottom: 4px solid var(--gold); }
    header h1 { font-family: 'Playfair Display', serif; font-size: 2.8em; letter-spacing: 4px; }
    header .tagline { font-size: 0.72em; color: var(--gold); margin-top: 5px; letter-spacing: 4px; text-transform: uppercase; }
    header .meta { font-size: 0.78em; color: #888; margin-top: 7px; }

    /* Controls */
    .controls { background: white; border-bottom: 1px solid var(--border); padding: 9px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .controls-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .ctrl-label { font-size: 0.72em; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .pill-btn { padding: 4px 14px; border: 1px solid var(--border); border-radius: 20px; background: none; font-size: 0.8em; cursor: pointer; color: #666; transition: all 0.15s; font-family: inherit; white-space: nowrap; }
    .pill-btn:hover:not(.active) { border-color: var(--gold); color: #444; }
    .pill-btn.active { background: var(--dark); border-color: var(--dark); color: white; }
    .controls-right { margin-left: auto; font-size: 0.72em; color: #bbb; font-style: italic; }

    /* Main */
    .main { max-width: 1200px; margin: 0 auto; padding: 30px 20px 60px; }

    /* No edition dividers needed */

    /* Category */
    .cat-section { margin-bottom: 32px; }
    .cat-header { display: flex; align-items: center; gap: 8px; border-bottom: 2px solid var(--gold); margin-bottom: 14px; padding-bottom: 7px; }
    .cat-icon { font-size: 1.1em; }
    .cat-title { font-family: 'Playfair Display', serif; font-size: 1.2em; }

    /* Article grid */
    .article-grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

    /* Card */
    .article-card { background: white; border-radius: 4px; border-left: 4px solid var(--gold); box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; }
    .article-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .article-card.voted-up   { border-left-color: var(--green); }
    .article-card.voted-down { border-left-color: #ccc; opacity: 0.5; }
    .article-card.cat-hidden { display: none; }

    /* Card image */
    .card-image { width: 100%; height: 160px; object-fit: cover; display: block; background: #f0ebe0; }
    .card-image-placeholder { width: 100%; height: 4px; background: linear-gradient(90deg, var(--gold), var(--red)); }

    .card-body { padding: 14px 16px 8px; flex: 1; }
    .card-source { font-size: 0.68em; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.08em; line-height: 1.4; margin-bottom: 8px; color: var(--dark); }
    .card-kurz { font-size: 0.86em; line-height: 1.6; color: #555; }
    .card-hint { font-size: 0.7em; color: var(--gold); margin-top: 9px; opacity: 0.8; }

    .card-actions { padding: 8px 18px 11px; border-top: 1px solid #f0ebe0; display: flex; align-items: center; gap: 7px; }
    .vote-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 3px 11px; font-size: 0.78em; cursor: pointer; color: #aaa; transition: all 0.15s; font-family: inherit; }
    .vote-btn:hover { border-color: var(--gold); color: #555; }
    .vote-btn.active-up   { background: #e8f5ec; border-color: var(--green); color: var(--green); font-weight: 600; }
    .vote-btn.active-down { background: #f5f5f5; border-color: #ccc; color: #aaa; }
    .vote-lbl { font-size: 0.7em; color: #ccc; margin-left: auto; font-style: italic; }

    /* Panel overlay */
    .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .panel-overlay.open { opacity: 1; pointer-events: all; }

    /* Article panel */
    .article-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(800px, 100vw); background: white; z-index: 301; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94); display: flex; flex-direction: column; overflow: hidden; }
    .article-panel.open { transform: translateX(0); }

    .panel-header { background: var(--dark); color: white; padding: 13px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; border-bottom: 3px solid var(--gold); }
    .panel-back { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 20px; padding: 4px 14px; cursor: pointer; font-size: 0.82em; font-family: inherit; transition: background 0.15s; }
    .panel-back:hover { background: rgba(255,255,255,0.1); }
    .panel-cat { font-size: 0.7em; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

    .panel-body { flex: 1; overflow-y: auto; padding: 28px 36px 50px; }

    .panel-title { font-family: 'Playfair Display', serif; font-size: 1.75em; line-height: 1.35; margin-bottom: 14px; }

    /* Sources bar */
    .sources-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .source-chip { font-size: 0.72em; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--gold); border-radius: 12px; padding: 2px 10px; }
    .source-chip a { color: inherit; text-decoration: none; }
    .source-chip a:hover { color: var(--red); border-color: var(--red); }
    .sources-bar .time-info { font-size: 0.75em; color: var(--muted); margin-left: auto; font-style: italic; }

    /* Summary box */
    .summary-box { background: #faf7f2; border-left: 4px solid var(--gold); border-radius: 0 3px 3px 0; padding: 16px 20px; margin-bottom: 24px; font-size: 0.98em; line-height: 1.75; color: #444; font-style: italic; }

    /* Article body */
    .article-body { font-size: 0.93em; line-height: 1.85; color: #333; }
    .article-body p { margin-bottom: 1.1em; }
    .article-body h2 { font-family: 'Playfair Display', serif; font-size: 1.25em; margin: 1.6em 0 0.6em; color: var(--dark); }
    .article-body h3 { font-family: 'Playfair Display', serif; font-size: 1.05em; margin: 1.2em 0 0.5em; color: #444; }
    .article-body strong { color: var(--dark); }
    .article-body blockquote { border-left: 3px solid var(--gold); padding-left: 14px; color: #666; margin: 1em 0; font-style: italic; }
    .article-body ul, .article-body ol { margin: 0.5em 0 1em 1.4em; }
    .article-body li { margin-bottom: 0.3em; }
    .article-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

    /* Gegenstimme */
    .gegenstimme-box { background: #f8f4f0; border-left: 4px solid #8b4513; border-radius: 0 3px 3px 0; padding: 14px 18px; margin: 20px 0; }
    .gegenstimme-box .gs-label { font-size: 0.68em; font-weight: 700; color: #8b4513; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .gegenstimme-box p { font-size: 0.9em; line-height: 1.7; color: #555; font-style: italic; }

    /* Sources footer */
    .sources-footer { margin-top: 28px; padding-top: 18px; border-top: 1px solid var(--border); }
    .sources-footer .sf-label { font-size: 0.68em; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .sources-footer ul { list-style: none; padding: 0; }
    .sources-footer li { font-size: 0.82em; color: var(--muted); padding: 2px 0; }
    .sources-footer a { color: var(--gold); text-decoration: none; }
    .sources-footer a:hover { text-decoration: underline; }

    /* Loading */
    .panel-loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-style: italic; }
    #loadingState { text-align: center; padding: 80px 20px; color: var(--muted); font-style: italic; font-size: 1.1em; }

    footer { background: var(--dark); color: #555; text-align: center; padding: 18px; font-size: 0.74em; letter-spacing: 1px; }
    footer span { color: var(--gold); }

    @media (max-width: 600px) {
      header h1 { font-size: 2em; }
      header { padding: 18px 16px; }
      .panel-body { padding: 20px 18px 30px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span>📰 Persönlicher Pressespiegel</span>
  <div class="topbar-editions" id="topEditions"></div>
</div>

<header>
  <h1>Pressespiegel</h1>
  <div class="tagline">Täglich aktualisiert · Zusammengestellt von Data</div>
  <div class="meta" id="headerMeta">Wird geladen…</div>
</header>

<div class="controls">
  <span class="ctrl-label">Thema:</span>
  <button class="pill-btn active" data-cat="all">Alle</button>
  <button class="pill-btn" data-cat="regional">🏘️ Bern</button>
  <button class="pill-btn" data-cat="schweiz">🇨🇭 Schweiz</button>
  <button class="pill-btn" data-cat="international">🌍 International</button>
  <button class="pill-btn" data-cat="politik">🏛️ Politik</button>
  <button class="pill-btn" data-cat="wirtschaft">💼 Wirtschaft</button>
  <button class="pill-btn" data-cat="tech">⚡ Tech</button>
  <span class="controls-right" id="ctrlUpdated"></span>
</div>

<div class="main" id="mainContent">
  <div id="loadingState">Nachrichten werden geladen…</div>
</div>

<footer>
  <span>Data</span> für François · OpenClaw Pressespiegel
</footer>

<div class="panel-overlay" id="overlay"></div>
<div class="article-panel" id="articlePanel">
  <div class="panel-header">
    <button class="panel-back" id="panelBack">← Zurück</button>
    <span class="panel-cat" id="panelCat"></span>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="panel-loading">Artikel wird geladen…</div>
  </div>
</div>

<script>
const REPO   = 'bredar/pressespiegel';
const BRANCH = 'main';
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

let manifest    = null;
let currentCat  = 'all';
let articleCache = {};

function cacheBust() { return `?t=${Math.floor(Date.now() / 60000)}`; }

function parseFrontmatter(text) {
  const fm = {};
  const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!match) return { meta: fm, body: text };
  const body = match[2].trim();
  let inMultiline = null;
  match[1].split('\n').forEach(line => {
    if (inMultiline) {
      if (line.startsWith('  ') || line.startsWith('\t')) {
        fm[inMultiline] += '\n' + line.trim();
      } else { inMultiline = null; }
    }
    const m = line.match(/^(\w+):\s*"(.*)"$/) || line.match(/^(\w+):\s*(.+)$/);
    if (m && !inMultiline) {
      fm[m[1]] = m[2].replace(/^"(.*)"$/, '$1');
    }
  });
  return { meta: fm, body };
}

function fmtDate(d) {
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const dt = new Date(d + 'T12:00:00Z');
  return `${days[dt.getUTCDay()]}, ${dt.getUTCDate()}. ${months[dt.getUTCMonth()]} ${dt.getUTCFullYear()}`;
}

async function loadManifest() {
  try {
    const r = await fetch(`${RAW}/manifest.json${cacheBust()}`);
    if (!r.ok) throw new Error('Manifest nicht gefunden');
    manifest = await r.json();
    renderPortal();
  } catch(e) {
    document.getElementById('loadingState').innerHTML =
      `<div style="color:var(--red);padding:20px">⚠️ ${e.message}</div>`;
  }
}

function renderPortal() {
  const days = manifest?.days;
  if (!days?.length) {
    document.getElementById('mainContent').innerHTML =
      '<div style="text-align:center;padding:60px;color:var(--muted)"><h2 style="font-family:Playfair Display,serif">Noch keine Ausgabe heute</h2><p style="margin-top:8px">Die erste Ausgabe erscheint um 07:00 Uhr.</p></div>';
    return;
  }

  const day = days[0];
  document.getElementById('headerMeta').textContent =
    `${fmtDate(day.date)} · Aktualisiert: ${manifest.updated || '–'}`;
  document.getElementById('ctrlUpdated').textContent = manifest.updated || '';
  document.getElementById('topEditions').innerHTML = '';

  // Collect ALL articles from all editions into one flat list (newest first)
  const allArticles = [];
  const seenIds = new Set();
  // Order: evening > midday > morning (newest first)
  ['evening','midday','morning','all'].forEach(edKey => {
    const ed = day.editions?.[edKey];
    if (!ed?.articles?.length) return;
    [...ed.articles].forEach(a => {
      if (!seenIds.has(a.id)) { seenIds.add(a.id); allArticles.push(a); }
    });
  });

  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  if (!allArticles.length) {
    main.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">Noch keine Artikel.</div>';
    return;
  }

  // Group by category
  const catOrder = ['regional','schweiz','international','politik','wirtschaft','tech'];
  const catMeta = {
    regional:      ['🏘️','Bern & Region'],
    schweiz:       ['🇨🇭','Schweiz'],
    international: ['🌍','International'],
    politik:       ['🏛️','Politik'],
    wirtschaft:    ['💼','Wirtschaft'],
    tech:          ['⚡','Tech & Mobilität'],
  };

  const cats = {};
  allArticles.forEach(a => { (cats[a.category] = cats[a.category]||[]).push(a); });

  catOrder.forEach(cat => {
    if (!cats[cat]?.length) return;
    const [icon, label] = catMeta[cat] || ['•', cat];
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.dataset.cat = cat;
    sec.innerHTML = `
      <div class="cat-header"><span class="cat-icon">${icon}</span><h2 class="cat-title">${label}</h2></div>
      <div class="article-grid">${cats[cat].map(renderCard).join('')}</div>`;
    main.appendChild(sec);
  });

  applyVotes();
  applyCatFilter();
}

function renderCard(a) {
  const sourceLine = Array.isArray(a.sources)
    ? a.sources.map(s => s.name||s).join(' · ')
    : (a.source || '');
  const imgHtml = a.image
    ? `<img class="card-image" src="${a.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="card-image-placeholder"></div>`;
  return `
    <div class="article-card" data-id="${a.id}" data-cat="${a.category}" onclick="openArticle('${a.id}')">
      ${imgHtml}
      <div class="card-body">
        <div class="card-source">${sourceLine}${a.time ? ' · ' + a.time : ''}</div>
        <div class="card-title">${a.title}</div>
        <div class="card-kurz">${a.kurz||''}</div>
        <div class="card-hint">Vollständig lesen →</div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="vote-btn vote-up" onclick="vote('${a.id}','up')">👍 Interessant</button>
        <button class="vote-btn vote-down" onclick="vote('${a.id}','down')">👎 Weniger</button>
        <span class="vote-lbl" id="vlbl-${a.id}"></span>
      </div>
    </div>`;
}

async function openArticle(id) {
  const panel   = document.getElementById('articlePanel');
  const overlay = document.getElementById('overlay');
  const body    = document.getElementById('panelBody');

  panel.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  body.innerHTML = '<div class="panel-loading">Artikel wird geladen…</div>';

  // Find meta
  let meta = null;
  manifest?.days?.forEach(d => {
    Object.values(d.editions||{}).forEach(ed => {
      ed?.articles?.forEach(a => { if (a.id===id) meta=a; });
    });
  });

  const catLabels = { regional:'🏘️ Bern & Region', schweiz:'🇨🇭 Schweiz', international:'🌍 International', politik:'🏛️ Politik', wirtschaft:'💼 Wirtschaft', tech:'⚡ Tech & Mobilität' };
  document.getElementById('panelCat').textContent = catLabels[meta?.category]||'';

  let parsed;
  if (articleCache[id]) {
    parsed = articleCache[id];
  } else {
    try {
      const file = meta?.file || `articles/${id}.md`;
      const r = await fetch(`${RAW}/${file}${cacheBust()}`);
      if (!r.ok) throw new Error('Artikel nicht verfügbar');
      parsed = parseFrontmatter(await r.text());
      articleCache[id] = parsed;
    } catch(e) {
      body.innerHTML = `<div style="color:var(--red);padding:20px">⚠️ ${e.message}</div>`;
      return;
    }
  }

  const fm  = parsed.meta;
  const mdBody = parsed.body;
  const title   = fm.title   || meta?.title   || '';
  const summary = fm.summary || fm.mittel     || meta?.kurz || '';
  const gegenstimme = fm.gegenstimme || '';
  const date    = fm.date    || meta?.date    || '';
  const time    = fm.time    || meta?.time    || '';

  // Sources
  let sources = [];
  try {
    // Try JSON array in fm.sources
    if (fm.sources_json) sources = JSON.parse(fm.sources_json);
    else if (Array.isArray(meta?.sources)) sources = meta.sources;
    else if (meta?.source) sources = [{ name: meta.source, url: meta?.url||'' }];
  } catch { sources = meta?.source ? [{ name: meta.source, url: meta?.url||'' }] : []; }

  const sourceChips = sources.map(s => {
    const name = s.name||s;
    const url  = s.url||'';
    return url ? `<span class="source-chip"><a href="${url}" target="_blank" rel="noopener">${name}</a></span>`
               : `<span class="source-chip">${name}</span>`;
  }).join('');

  // Render markdown body (remove gegenstimme if embedded, we handle it separately)
  let rendered = marked.parse(mdBody);

  // Insert gegenstimme box before sources footer if fm.gegenstimme exists
  const gegenstimmeHtml = gegenstimme ? `
    <div class="gegenstimme-box">
      <div class="gs-label">🔄 Gegenperspektive / Kritische Stimme</div>
      <p>${gegenstimme.replace(/\\n/g,'<br>')}</p>
    </div>` : '';

  // Sources footer
  const srcFooter = sources.length ? `
    <div class="sources-footer">
      <div class="sf-label">Quellen</div>
      <ul>${sources.map(s => {
        const n = s.name||s; const u = s.url||'';
        return `<li>${u ? `<a href="${u}" target="_blank" rel="noopener">${n}</a>` : n}</li>`;
      }).join('')}</ul>
    </div>` : '';

  body.innerHTML = `
    <div class="panel-title">${title}</div>
    <div class="sources-bar">
      ${sourceChips}
      <span class="time-info">${date ? fmtDate(date) : ''} ${time ? '· '+time+' Uhr' : ''}</span>
    </div>
    ${summary ? `<div class="summary-box">${summary.replace(/\\n/g,'<br><br>')}</div>` : ''}
    ${gegenstimmeHtml}
    <div class="article-body">${rendered}</div>
    ${srcFooter}`;

  body.scrollTop = 0;
}

function closePanel() {
  document.getElementById('articlePanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function applyCatFilter() {
  document.querySelectorAll('.article-card').forEach(c => {
    c.classList.toggle('cat-hidden', currentCat !== 'all' && c.dataset.cat !== currentCat);
  });
  document.querySelectorAll('.cat-section').forEach(s => {
    s.style.display = (currentCat === 'all' || s.dataset.cat === currentCat) ? '' : 'none';
  });
}

// Votes
const VOTE_KEY = 'ps-votes';
function loadVotes() { try { return JSON.parse(localStorage.getItem(VOTE_KEY)||'{}'); } catch { return {}; } }
function vote(id, v) {
  const votes = loadVotes();
  if (votes[id]?.vote === v) delete votes[id]; else votes[id] = { vote:v, ts:Date.now() };
  localStorage.setItem(VOTE_KEY, JSON.stringify(votes));
  applyVotes();
}
function applyVotes() {
  const votes = loadVotes();
  document.querySelectorAll('.article-card[data-id]').forEach(card => {
    const v = votes[card.dataset.id]?.vote;
    card.classList.toggle('voted-up',   v==='up');
    card.classList.toggle('voted-down', v==='down');
    card.querySelector('.vote-up')?.classList.toggle('active-up',     v==='up');
    card.querySelector('.vote-down')?.classList.toggle('active-down', v==='down');
    const lbl = document.getElementById('vlbl-'+card.dataset.id);
    if (lbl) lbl.textContent = v==='up' ? 'Mehr davon' : v==='down' ? 'Weniger' : '';
  });
}

// Events
document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    applyCatFilter();
  });
});

document.getElementById('panelBack').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key==='Escape') closePanel(); });

loadManifest();
</script>
</body>
</html>
